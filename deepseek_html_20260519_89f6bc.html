<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Рандомные пожелания ✨</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #1e2a3a 0%, #0f1724 100%);
            font-family: 'Segoe UI', 'Poppins', 'Montserrat', system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .glass-card {
            max-width: 700px;
            width: 100%;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(16px);
            border-radius: 64px;
            padding: 30px 28px 45px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(255, 215, 150, 0.2);
            text-align: center;
            transition: 0.2s;
            border: 1px solid rgba(255, 220, 150, 0.4);
        }

        h1 {
            font-size: 2.4rem;
            font-weight: 800;
            background: linear-gradient(135deg, #FFE6B0, #FFB347);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
        }

        .sub {
            color: #cbd5e6;
            font-size: 1rem;
            border-bottom: 1px dashed rgba(255, 180, 70, 0.5);
            display: inline-block;
            padding-bottom: 6px;
            margin-bottom: 30px;
        }

        /* карточка пожелания */
        .wish-box {
            background: rgba(0, 0, 0, 0.55);
            border-radius: 48px;
            padding: 40px 22px;
            margin: 20px 0;
            border-left: 4px solid #FFB347;
            border-right: 4px solid #FFB347;
            transition: all 0.2s ease;
            cursor: pointer;
            min-height: 250px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .wish-text {
            font-size: 1.8rem;
            line-height: 1.4;
            font-weight: 600;
            color: #FFF5E0;
            word-break: break-word;
            font-family: 'Segoe UI', 'Georgia', serif;
            text-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        /* эмодзи-декор */
        .emoji-deco {
            font-size: 3rem;
            margin-bottom: 12px;
            display: inline-block;
            filter: drop-shadow(0 4px 6px black);
        }

        button {
            background: linear-gradient(to right, #ff9a3c, #ffc857);
            border: none;
            padding: 14px 28px;
            border-radius: 60px;
            font-weight: bold;
            font-size: 1.2rem;
            margin: 10px 8px;
            cursor: pointer;
            transition: 0.1s linear;
            color: #1e2a2e;
            font-weight: 800;
            box-shadow: 0 6px 14px rgba(0, 0, 0, 0.3);
        }

        button:active {
            transform: scale(0.96);
        }

        .secondary {
            background: #2d3e4b;
            color: #ffdd99;
            box-shadow: none;
        }

        .counter {
            margin-top: 20px;
            background: #00000055;
            border-radius: 60px;
            display: inline-flex;
            padding: 8px 20px;
            gap: 12px;
            font-size: 1rem;
            color: #ddd;
        }

        .counter span {
            font-weight: bold;
            color: #ffb347;
            font-size: 1.4rem;
            margin-left: 6px;
        }

        footer {
            font-size: 0.7rem;
            margin-top: 30px;
            color: #8e9aaf;
        }

        @keyframes gentlePop {
            0% { transform: scale(1); opacity: 0.8; }
            80% { transform: scale(1.02); }
            100% { transform: scale(1); opacity: 1; }
        }

        .pop {
            animation: gentlePop 0.25s ease-in-out;
        }

        @media (max-width: 550px) {
            .wish-text { font-size: 1.3rem; }
            h1 { font-size: 1.8rem; }
            .glass-card { padding: 20px; }
        }
    </style>
</head>
<body>
<div class="glass-card">
    <h1>✨ Рандомные пожелания ✨</h1>
    <div class="sub">нажми — и получи своё</div>

    <div class="wish-box" id="wishBox">
        <div>
            <div class="emoji-deco" id="emojiArea">🎲</div>
            <div class="wish-text" id="wishMessage">
                Жми на кнопку или на карточку 👇
            </div>
        </div>
    </div>

    <div>
        <button id="newWishBtn">🎁 Новое пожелание</button>
        <button id="copyLinkBtn" class="secondary">🔗 Скопировать ссылку</button>
    </div>

    <div class="counter">
        📜 Пожеланий показано: <span id="wishCounter">0</span>
    </div>
    <footer>
        🌟 Случайные тёплые слова для тебя и друзей<br>
        открой ссылку — получи порцию добра
    </footer>
</div>

<script>
    // МАССИВ РАЗНООБРАЗНЫХ ПОЖЕЛАНИЙ (50+)
    const wishes = [
        "Пусть каждый день приносит маленькое чудо 🕊️",
        "Желаю тебе неожиданной удачи там, где ты её не ждёшь 🍀",
        "Пусть внутри всегда горит тёплый свет 💛",
        "Океан спокойствия и горы вдохновения 🏔️",
        "Будь смелее — твоя интуиция тебя не подведёт 🌙",
        "Пусть кошелёк радует шелестом, а сердце — радостью 💰❤️",
        "Желаю тебе услышать именно те слова, которые нужны сейчас 🎧",
        "Пусть произойдёт что-то, что заставит тебя улыбнуться до ушей 😁",
        "Ты сильнее, чем кажется. Пусть ты это вспомнишь сегодня ⚡",
        "Карьерный взлёт, творческий пожар и здоровая дерзость 🚀",
        "Пусть рядом окажутся верные люди ❤️‍🔥",
        "Идеальный баланс: работа + отдых + кайф 🧘",
        "Желаю тебе кофе без горечи и людей без фальши ☕",
        "Пусть сегодняшний вечер подарит спокойствие и уют 🕯️",
        "Твоя волна успеха уже близко. Держись! 🏄‍♂️",
        "Пусть все незакрытые гештальты закроются красиво 📖",
        "Желаю тебе радоваться мелочам: солнцу, снегу, вкусному чаю 🍵",
        "Пусть твоя энергия притягивает возможности 🌈",
        "Побед без поражений не бывает, но ты справишься с любым 💪",
        "В дом — тепло, в душу — мир, в голову — ясность 🏡",
        "Желаю тебе услышать свой внутренний ритм и танцевать под него 🎶",
        "Пусть удача ходит за тобой хвостиком 🐈⬛",
        "Маленькое приключение и большая улыбка 🎢",
        "Денежный поток — как горная река: мощный и чистый 💎",
        "Здоровья, как у космонавта, и лёгкости, как у ветра 🍃",
        "Пусть твои планы совпадают с возможностями 📌",
        "Желаю тебе сладкого сна и яркого утра 🌅",
        "Пусть все «потом» превратятся в «сейчас» ✨",
        "Вдохновения, которое разбудит ночью и заставит творить 🎨",
        "Пусть дороги ведут только туда, куда ты хочешь 🗺️",
        "Будь как алмаз: крепкий, редкий и сверкающий 💎",
        "Пусть телефон разрывается от хороших новостей 📱",
        "Желаю тебе оказаться в нужном месте в нужное время ⏳",
        "Любви, которая не требует масок 💞",
        "Пусть внутренний критик замолчит, а вдохновение заговорит 🎤",
        "Желаю внезапного подарка от судьбы 🎁",
        "Спокойной ночи, если вечер, или бодрого утра, если день ☀️",
        "Пусть сегодня ты сделаешь шаг, который изменит многое 👣",
        "Желаю тебе быть главным героем своей истории 🦸‍♀️🦸‍♂️",
        "Пусть даже неудачи работают на твой успех 🔄",
        "Гармонии с собой и лёгкости в общении 🤝",
        "Пусть в кошельке заведутся золотые монетки 🪙",
        "Тепла, даже когда вокруг холодно 🔥",
        "Желаю тебе поймать дзен и не выпускать 🧘‍♀️",
        "Пусть твой авантюризм приведёт к большой удаче 🎰",
        "Море, горы, лес или уютный диван — пусть будет то, что радует 🌲",
        "Пусть улыбка станет твоим фирменным стилем 😊",
        "Желаю тебе не бояться быть счастливым 💖",
        "Романтика, драйв, спокойствие — ровно столько, сколько нужно ⚖️",
        "Пусть твои желания успевают материализоваться быстрее новых 🤞",
        "Желаю чувствовать вкус жизни каждый день 🍭",
        "Пусть удача подмигнёт тебе сегодня 😉"
    ];

    let showCounter = 0;
    const wishTextEl = document.getElementById('wishMessage');
    const emojiEl = document.getElementById('emojiArea');
    const counterSpan = document.getElementById('wishCounter');
    const wishBoxDiv = document.getElementById('wishBox');

    // функция получения случайного пожелания + эмодзи по настроению
    function getRandomWish() {
        const randomIndex = Math.floor(Math.random() * wishes.length);
        let rawWish = wishes[randomIndex];
        
        // небольшая магия: иногда добавляем рандомный эмодзи спереди
        const randomBonusEmojis = ["✨", "💫", "🌟", "🍀", "💖", "🔥", "🎯", "🌈", "⭐", "🕯️"];
        const bonusEmoji = randomBonusEmojis[Math.floor(Math.random() * randomBonusEmojis.length)];
        
        // отделяем возможный эмодзи в конце/начале
        let finalText = rawWish;
        let mainEmoji = "🎲";
        
        // если в пожелании уже есть эмодзи, используем его как главный
        const emojiMatch = rawWish.match(/([\u{1F300}-\u{1F6FF}\u{2600}-\u{26FF}\u{2700}-\u{27BF}]+)/u);
        if (emojiMatch) {
            mainEmoji = emojiMatch[0];
        } else {
            mainEmoji = bonusEmoji;
        }
        
        emojiEl.innerText = mainEmoji;
        return finalText;
    }

    function updateWish() {
        const newWish = getRandomWish();
        wishTextEl.innerHTML = newWish;
        
        // анимация
        wishBoxDiv.classList.add('pop');
        setTimeout(() => wishBoxDiv.classList.remove('pop'), 300);
        
        // увеличиваем счетчик просмотров
        showCounter++;
        counterSpan.innerText = showCounter;
        
        // сохраним счетчик в localStorage (чтобы при обновлении страницы не сбрасывался)
        localStorage.setItem('wishCounter', showCounter);
    }

    function resetCounter() {
        showCounter = 0;
        counterSpan.innerText = "0";
        localStorage.setItem('wishCounter', showCounter);
        wishTextEl.innerHTML = "✨ Счётчик сброшен. Желания работают! ✨";
        emojiEl.innerText = "🔄";
        setTimeout(() => {
            if(showCounter === 0) wishTextEl.innerHTML = "Жми на кнопку или на карточку 👇";
        }, 1500);
    }

    // копировать ссылку на сайт с рандомными пожеланиями
    function copySiteLink() {
        const url = window.location.href;
        navigator.clipboard.writeText(url).then(() => {
            alert("✅ Ссылка скопирована! Теперь друг тоже может получать случайные пожелания.");
        }).catch(() => {
            alert("❌ Не удалось скопировать, но вот ссылка: " + url);
        });
    }

    // загрузить счётчик из localStorage
    function loadCounter() {
        const saved = localStorage.getItem('wishCounter');
        if (saved !== null && !isNaN(parseInt(saved))) {
            showCounter = parseInt(saved);
            counterSpan.innerText = showCounter;
            if(showCounter > 0){
                wishTextEl.innerHTML = "👋 Желаю тебе чего-то нового! Жми ещё 👋";
                emojiEl.innerText = "🎁";
            }
        } else {
            showCounter = 0;
            counterSpan.innerText = "0";
        }
    }

    // Обработчики
    document.getElementById('newWishBtn').addEventListener('click', updateWish);
    document.getElementById('copyLinkBtn').addEventListener('click', copySiteLink);
    wishBoxDiv.addEventListener('click', updateWish);
    
    // дополнительная кнопка для сброса (на всякий случай, сделаем через комбинацию или просто добавим скрытую? добавим явно в DOM, если нужно)
    // но для удобства добавим сброс через двойной клик по карточке (необязательно, но сделаем)
    // а также можно сделать сброс скрытым, но я добавлю кнопку сброса счетчика в код (по желанию юзера)
    // однако в дизайне уже есть копирование ссылки и основная кнопка. добавлю ещё одну аккуратную кнопку "сброс счетчика"
    const resetBtn = document.createElement('button');
    resetBtn.innerText = '🔄 Сброс счётчика';
    resetBtn.classList.add('secondary');
    resetBtn.style.marginTop = '8px';
    resetBtn.addEventListener('click', resetCounter);
    document.querySelector('.counter').after(resetBtn);
    
    // инициализация
    loadCounter();
</script>
</body>
</html>
